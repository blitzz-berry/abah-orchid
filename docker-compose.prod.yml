name: orchidmart-prod

services:
  api:
    image: ${BACKEND_IMAGE:-orchidmart-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DB_HOST: postgres
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      REDIS_HOST: redis
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
      PRIVATE_UPLOAD_DIR: /app/private_uploads
      UPLOAD_PUBLIC_URL: ${UPLOAD_PUBLIC_URL}
      PAYMENT_EXPIRY_WORKER: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
      - private_uploads:/app/private_uploads

  frontend:
    image: ${FRONTEND_IMAGE:-orchidmart-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${NEXT_PUBLIC_MIDTRANS_CLIENT_KEY}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    environment:
      NODE_ENV: production
      PORT: 3000
      API_INTERNAL_URL: http://api:8080/api/v1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  private_uploads:
