version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orchidmart_postgres
    environment:
      POSTGRES_USER: orchidmart
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: orchidmart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: orchidmart_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
